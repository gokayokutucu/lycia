name: Publish NuGet

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.targets'
      - 'version.json'

jobs:
  unit-tests:
    name: Unit tests (.NET Core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags for NBGV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x
            6.0.x

      - name: Restore
        run: dotnet restore Lycia.sln

      - name: Build (Release)
        run: dotnet build Lycia.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/Lycia.Tests/Lycia.Tests.csproj -c Release --no-build --logger "trx;LogFileName=unit.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/unit.trx'

  integration-tests:
    name: Integration tests (.NET Core)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management
        ports: ['5672:5672', '15672:15672']
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - name: Checkout (full history + tags for NBGV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x
            6.0.x

      - name: Wait for Redis to be healthy
        run: |
          echo "Waiting for Redis to be healthy..."
          timeout 30 bash -c 'until redis-cli -h 127.0.0.1 -p 6379 ping; do sleep 1; done'
          echo "✅ Redis is healthy!"

      - name: Wait for RabbitMQ to be healthy
        run: |
          echo "Waiting for RabbitMQ to be healthy..."
          timeout 60 bash -c 'until curl -f http://localhost:15672/api/health/checks/alarms 2>/dev/null; do sleep 2; done'
          echo "✅ RabbitMQ is healthy!"

      - name: Restore
        run: dotnet restore Lycia.sln

      - name: Build (Release)
        run: dotnet build Lycia.sln -c Release --no-restore

      - name: Run integration tests
        env:
          LYCIA__EVENTBUS__CONNECTIONSTRING: amqp://guest:guest@127.0.0.1:5672/
          LYCIA__EVENTSTORE__CONNECTIONSTRING: 127.0.0.1:6379
        run: dotnet test tests/Lycia.IntegrationTests/Lycia.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/integration.trx'

  unit-tests-netframework:
    name: Unit tests (NetFramework)
    runs-on: windows-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout (full history + tags for NBGV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x
            6.0.x

      - name: Restore
        run: dotnet restore Lycia.sln

      - name: Build (Release)
        run: dotnet build Lycia.sln -c Release --no-restore

      - name: Run unit tests (NetFramework)
        run: dotnet test tests/Lycia.Tests.NetFramework/Lycia.Tests.NetFramework.csproj -c Release --no-build --logger "trx;LogFileName=unit-netframework.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-netframework-test-results
          path: '**/unit-netframework.trx'

  integration-tests-netframework:
    name: Integration tests (NetFramework)
    runs-on: windows-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout (full history + tags for NBGV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x
            6.0.x

      - name: Setup Redis (Windows)
        run: |
          choco install redis-64 -y
          redis-server --service-install
          redis-server --service-start
          Start-Sleep -Seconds 5

      - name: Wait for Redis to be healthy
        run: |
          $maxAttempts = 10
          $attempt = 0
          do {
            $attempt++
            Write-Host "Checking Redis health (attempt $attempt/$maxAttempts)..."
            try {
              $result = redis-cli ping
              if ($result -eq "PONG") {
                Write-Host "✅ Redis is healthy!"
                exit 0
              }
            } catch {
              Write-Host "Redis not ready yet..."
            }
            Start-Sleep -Seconds 2
          } while ($attempt -lt $maxAttempts)
          Write-Error "❌ Redis failed to become healthy"
          exit 1

      - name: Setup RabbitMQ (Windows)
        run: |
          choco install rabbitmq -y
          Start-Sleep -Seconds 10
          rabbitmq-plugins enable rabbitmq_management
          Start-Sleep -Seconds 5

      - name: Wait for RabbitMQ to be healthy
        run: |
          $maxAttempts = 20
          $attempt = 0
          do {
            $attempt++
            Write-Host "Checking RabbitMQ health (attempt $attempt/$maxAttempts)..."
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:15672/api/health/checks/alarms" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host "✅ RabbitMQ is healthy!"
                exit 0
              }
            } catch {
              Write-Host "RabbitMQ not ready yet..."
            }
            Start-Sleep -Seconds 3
          } while ($attempt -lt $maxAttempts)
          Write-Error "❌ RabbitMQ failed to become healthy"
          exit 1

      - name: Restore
        run: dotnet restore Lycia.sln

      - name: Build (Release)
        run: dotnet build Lycia.sln -c Release --no-restore

      - name: Run integration tests (NetFramework)
        env:
          LYCIA__EVENTBUS__CONNECTIONSTRING: amqp://guest:guest@localhost:5672/
          LYCIA__EVENTSTORE__CONNECTIONSTRING: localhost:6379
        run: dotnet test tests/Lycia.IntegrationTests.NetFramework/Lycia.IntegrationTests.NetFramework.csproj -c Release --no-build --logger "trx;LogFileName=integration-netframework.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-netframework-test-results
          path: '**/integration-netframework.trx'

  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: [unit-tests-netframework, integration-tests-netframework]

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x
            6.0.x

      - name: Clear NuGet caches
        run: dotnet nuget locals all --clear

      - name: Create nuget.config with source mapping
        run: |
          cat > nuget.config <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="local" value="./artifacts/nupkgs" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local">
                <package pattern="Lycia" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          XML

      - name: Restore (solution)
        run: dotnet restore Lycia.sln

      - name: Build (Release)
        run: dotnet build Lycia.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Show computed version (SemVer2)
        run: |
          dotnet tool install -g nbgv || true
          nbgv get-version -v SemVer2

      - name: Pack Lycia
        run: dotnet pack src/Lycia/Lycia.csproj -c Release -o artifacts/nupkgs /p:ContinuousIntegrationBuild=true --no-restore

      - name: Validate Lycia package contents
        run: |
          ls -la artifacts/nupkgs
          PKG=$(ls artifacts/nupkgs/Lycia.*.nupkg | sort -V | tail -n1)
          echo "Lycia nupkg: $PKG"
          unzip -l "$PKG" | sed -n '1,200p'

      - name: Push Lycia (nuget.org)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/nupkgs/Lycia.*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate

      - name: Compute Lycia min floor (strip commit hash)
        id: floor
        run: |
          LATEST=$(ls artifacts/nupkgs/Lycia.*.nupkg | sort -V | tail -n1)
          VER=${LATEST##*/Lycia.}
          VER=${VER%.nupkg}
          FLOOR=$(echo "$VER" | sed -E 's/-g[0-9a-f]+$//')
          echo "Lycia floor: $FLOOR"
          echo "floor=$FLOOR" >> $GITHUB_OUTPUT

      - name: Restore Extensions with floor (pack mode)
        run: |
          dotnet restore src/Lycia.Extensions/Lycia.Extensions.csproj \
            -p:UsePackageRefForLyciaOnPack=true \
            -p:LyciaMinVersion='${{ steps.floor.outputs.floor }}' \
            --source "./artifacts/nupkgs" --source "https://api.nuget.org/v3/index.json"

      - name: Pack Extensions (no restore)
        run: |
          dotnet pack src/Lycia.Extensions/Lycia.Extensions.csproj -c Release \
            -o artifacts/nupkgs \
            -p:ContinuousIntegrationBuild=true \
            -p:UsePackageRefForLyciaOnPack=true \
            -p:LyciaMinVersion='${{ steps.floor.outputs.floor }}' \
            --no-restore

      - name: Validate Lycia.Extensions package contents
        run: |
          PKG=$(ls artifacts/nupkgs/Lycia.Extensions.*.nupkg | sort -V | tail -n1)
          echo "Lycia.Extensions nupkg: $PKG"
          unzip -l "$PKG" | sed -n '1,200p'
          echo "NUSPEC dependencies (should only contain Lycia):"
          unzip -p "$PKG" *.nuspec | sed -n '1,200p'

      - name: Push Lycia.Extensions (nuget.org)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/nupkgs/Lycia.Extensions.*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate

      - name: Restore OpenTelemetry Extensions with floor (pack mode)
        run: |
          dotnet restore src/Lycia.Extensions.OpenTelemetry/Lycia.Extensions.OpenTelemetry.csproj \
            -p:UsePackageRefForLyciaOnPack=true \
            -p:LyciaMinVersion='${{ steps.floor.outputs.floor }}' \
            --source "./artifacts/nupkgs" --source "https://api.nuget.org/v3/index.json"

      - name: Pack Lycia.Extensions.OpenTelemetry (no restore)
        run: |
          dotnet pack src/Lycia.Extensions.OpenTelemetry/Lycia.Extensions.OpenTelemetry.csproj -c Release \
            -o artifacts/nupkgs \
            -p:ContinuousIntegrationBuild=true \
            -p:UsePackageRefForLyciaOnPack=true \
            -p:LyciaMinVersion='${{ steps.floor.outputs.floor }}' \
            --no-restore

      - name: Validate Lycia.Extensions.OpenTelemetry package contents
        run: |
          PKG=$(ls artifacts/nupkgs/Lycia.Extensions.OpenTelemetry.*.nupkg | sort -V | tail -n1)
          echo "Lycia.Extensions.OpenTelemetry nupkg: $PKG"
          unzip -l "$PKG" | sed -n '1,200p'
          echo "NUSPEC dependencies (should only contain Lycia / Lycia.Extensions if applicable):"
          unzip -p "$PKG" *.nuspec | sed -n '1,200p'

      - name: Push Lycia.Extensions.OpenTelemetry (nuget.org)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/nupkgs/Lycia.Extensions.OpenTelemetry.*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
